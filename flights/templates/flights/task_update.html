{% extends 'base.html' %}

{% block content %}
<h1>Update Task</h1>

<form method="post">
    {% csrf_token %}

    <select name="status">
        <option value="pending">Pending</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
    </select>

    <button type="submit">Save</button>
</form>

{% endblock %}
